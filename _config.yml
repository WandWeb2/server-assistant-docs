# Jekyll configuration for the Server Assistant documentation site.
# Hosted on GitHub Pages — https://wandweb2.github.io/server-assistant-docs/

title: Server Assistant
tagline: Privacy-first Discord moderation — with optional AI enhancement.
description: >-
  Privacy-first Discord moderation bot. Full mod toolkit, AutoMod, anti-raid,
  audit logs, and a 9-panel Customisation Hub — all free. Premium adds an AI
  Concierge that reads your server and proposes specific improvements.
url: https://wandweb2.github.io
baseurl: /server-assistant-docs
lang: en-GB

# Hero / social-share image (used by Open Graph and Twitter Cards)
image: /assets/banner.jpeg

# Author — string form so Minima's footer renders it as plain text, not as
# the YAML hash literal. jekyll-seo-tag still picks this up for og:author.
author: WandWeb2

# Repository — used by jekyll-seo-tag to populate "see source" link metadata.
repository: WandWeb2/server-assistant-docs

# Use the bundled "minima" theme — looks clean out of the box, no custom CSS needed.
theme: minima

minima:
  social_links:
    github: WandWeb2/server-assistant
  show_excerpts: false

# GitHub Pages whitelist plugins — auto-enabled in the GH Pages build.
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Header logo for the theme
logo: /assets/logo.png

# Top-nav: trimmed to the marketing funnel (Setup → Features → Pricing →
# Compare → Roadmap). Deeper pages (Commands, FAQ, Support, Changelog) stay
# fully reachable via the footer — they just don't clutter the header.
header_pages:
  - setup.md
  - features.md
  - pricing.md
  - compare.md
  - roadmap.md
  - portal.md

# Pretty URLs: /privacy/ instead of /privacy.html
permalink: /:title/

# Markdown rendering
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

# Default front-matter values applied to every page (jekyll-seo-tag picks these up).
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      image: /assets/banner.jpeg

# Don't include drafts or other Jekyll noise in the build
exclude:
  - README.md
  - SECURITY.md
  - MAINTAINING.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - CLAUDE.md
  - scripts/
  - .omp/
