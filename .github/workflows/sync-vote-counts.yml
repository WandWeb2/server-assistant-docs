name: Sync vote counts

on:
  schedule:
    - cron: "*/15 * * * *"  # every 15 minutes
  workflow_dispatch: {}
  # Also refresh whenever a roadmap-related file is touched, just in case
  push:
    paths:
      - 'roadmap.md'
      - '.github/workflows/sync-vote-counts.yml'

permissions:
  contents: write
  discussions: read
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch vote counts via GraphQL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets/data
          # Discussions are keyed by bare number ("47"); issue-backed roadmap
          # cards (label: roadmap-vote) are namespaced as "i<number>" so the two
          # numbering spaces never collide. The client reads both from one map.
          gh api graphql -f query='
            query {
              repository(owner: "WandWeb2", name: "server-assistant-docs") {
                discussions(first: 100, categoryId: "DIC_kwDOSZFMS84C9fk3") {
                  nodes { number upvoteCount }
                }
                issues(first: 100, states: OPEN, labels: ["roadmap-vote"]) {
                  nodes { number reactions(content: THUMBS_UP) { totalCount } }
                }
              }
            }' --jq '{updated_at: (now | strftime("%Y-%m-%dT%H:%M:%SZ")),
                       counts: (
                         (.data.repository.discussions.nodes
                            | map({key: (.number|tostring), value: .upvoteCount}))
                         + (.data.repository.issues.nodes
                            | map({key: ("i" + (.number|tostring)), value: .reactions.totalCount}))
                         | from_entries)}' > assets/data/votes.json
          echo "--- new votes.json ---"
          cat assets/data/votes.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/votes.json
          if git diff --cached --quiet; then
            echo "no vote-count changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh vote counts [skip ci]"
          # Retry-on-push: if another commit landed between checkout and push,
          # rebase onto the new tip and try again. Bounded to 5 attempts.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected (attempt $i), pulling --rebase and retrying"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep $((RANDOM % 4 + 1))
          done
          echo "::error::could not push after 5 attempts"
          exit 1
